name: Generate Static Site

permissions:
  actions: read
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to process (e.g. 2026)"
        required: true

  workflow_run:
    workflows: ["Process Events"]
    types:
      - completed
    conclusions:
      - success
    branches:
      - master
      - feature/split-process-data

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # MANUAL RUN: year is provided directly, skip all artifact logic
      # ------------------------------------------------------------
      - name: Set year from manual input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: manualyear
        run: echo "year=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # AUTOMATIC RUN: wait for artifact to become downloadable
      # ------------------------------------------------------------
      - name: Wait until artifact is downloadable
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for 'year' artifact from run ${{ github.event.workflow_run.id }}"

          for i in {1..10}; do
            echo "Attempt $i..."

            gh api \
              repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
              --jq ".artifacts[] | select(.name==\"year\") | .archive_download_url" \
              > url.txt || true

            if [ -s url.txt ]; then
              echo "Artifact is downloadable!"
              exit 0
            fi

            echo "Artifact not downloadable yet, waiting..."
            sleep 3
          done

          echo "Artifact did not become downloadable in time"
          exit 1

      # ------------------------------------------------------------
      # AUTOMATIC RUN: download artifact via GitHub API
      # ------------------------------------------------------------
      - name: Download year artifact via API
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching artifact download URL..."
          url=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts[] | select(.name=="year") | .archive_download_url')

          echo "Downloading artifact..."
          curl -L -H "Authorization: Bearer $GH_TOKEN" "$url" --output artifact.zip

          echo "Extracting artifact..."
          unzip artifact.zip

      # ------------------------------------------------------------
      # UNIFIED YEAR OUTPUT: manual or automatic
      # ------------------------------------------------------------
      - name: Read year
        id: getyear
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "year=${{ github.event.inputs.year }}" >> $GITHUB_OUTPUT
          else
            echo "year=$(cat year.txt)" >> $GITHUB_OUTPUT
          fi

    outputs:
      year: ${{ steps.getyear.outputs.year }}

  # ------------------------------------------------------------
  # SITE GENERATION
  # ------------------------------------------------------------
  generate-site:
    needs: prepare
    uses: ./.github/workflows/_site-core.yml
    with:
      year: ${{ needs.prepare.outputs.year }}
    secrets:
      roundrobin_pat: ${{ secrets.ROUNDROBIN_PAT }}
