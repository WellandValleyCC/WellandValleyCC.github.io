name: Site Core

on:
  workflow_call:
    inputs:
      year:
        required: true
        type: string
    secrets:
      roundrobin_pat:
        required: true

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      year: ${{ steps.detect.outputs.year }}
      tag: ${{ steps.tag.outputs.tag }}
    concurrency:
      group: site-generation-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build solution
        run: dotnet build processor/ClubProcessor.sln --configuration Release

      - name: Detect year
        id: detect
        run: |
          set -euo pipefail

          YEAR="${{ inputs.year }}"

          if [ -z "$YEAR" ]; then
            echo "ERROR: Reusable workflow requires a year input"
            exit 1
          fi

          echo "Using provided year: $YEAR"

          echo "YEAR=$YEAR" >> "$GITHUB_ENV"
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"

      - name: Tag triggering commit
        id: tag
        run: |
          tag="site-update-${{ steps.detect.outputs.year }}-$(date +'%Y%m%d%H%M%S')"
          echo "tag=$tag" >> $GITHUB_ENV
          echo "tag=$tag" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$tag" "${{ github.sha }}"
          git push origin "$tag"

      - name: Run site generator
        run: ./scripts/generate-site.sh ${{ steps.detect.outputs.year }}

      - name: Verify generated output
        run: ls -R /tmp/wvcc-site || echo "No files generated"

      - name: Guard against excluded files
        run: |
          if [ -f /tmp/wvcc-site/index.htm ]; then
            echo "::warning file=/tmp/wvcc-site/index.htm::index.htm was generated"
          fi
          if [ -f /tmp/wvcc-site/index.html ]; then
            echo "::warning file=/tmp/wvcc-site/index.html::index.html was generated"
          fi
          if [ -d /tmp/wvcc-site/legacy ]; then
            echo "::warning file=/tmp/wvcc-site/legacy::legacy/ folder was generated"
          fi

      - name: Upload WVCC SiteOutput
        uses: actions/upload-artifact@v4
        with:
          name: wvcc-site
          path: /tmp/wvcc-site/SiteOutput/

      - name: Upload RoundRobin SiteOutput
        uses: actions/upload-artifact@v4
        with:
          name: rr-site
          path: /tmp/wvcc-site/RoundRobinSiteOutput/

  publish-wvcc:
    runs-on: ubuntu-latest
    needs: build-site
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          
      - name: Download WVCC SiteOutput
        uses: actions/download-artifact@v4
        with:
          name: wvcc-site
          path: docs/
                    
      - name: Prepare branch name
        run: |
          branch="site-update-wvcc-${{ needs.build-site.outputs.year }}-$(date +'%Y%m%d%H%M%S')"
          echo "branch=$branch" >> $GITHUB_ENV
                
      - name: Remove footer-only changes
        run: |
          set -euo pipefail
      
          for f in $(git ls-files | grep '^docs/.*\.html$'); do
          
            # Detect if there is ANY diff at all
            if git diff -U0 HEAD -- "$f" | grep -qE '^[+-]'; then
          
              # Extract changed lines, excluding diff headers and the footer timestamp
              changes=$(git diff -U0 HEAD -- "$f" \
                          | grep -E '^[+-]' \
                          | grep -vE '^[+-]{3}' \
                          | grep -vE '^[-+].*<p class="generated">Generated .* UTC</p>.*$' \
                          || true)
          
              if [ -z "$changes" ]; then
                echo "FOOTER ONLY: $f"
                git checkout HEAD -- "$f"
              else
                echo "REAL CHANGES: $f"
              fi
            fi
          done
          
      - name: Stage generated site
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git status --porcelain
          
      - name: Check for meaningful changes
        id: check_changes
        run: |
          if git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "No meaningful changes detected; skipping PR creation."
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "Meaningful changes detected; PR will be created."
          fi
          
      - name: Create Pull Request
        if: steps.check_changes.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          base: gh-pages
          branch: ${{ env.branch }}
          title: "Automated WVCC site generation for ${{ needs.build-site.outputs.year }}"
          body: |
            WVCC static site for season ${{ needs.build-site.outputs.year }}.

            Generated from commit tag:  
            [`${{ needs.build-site.outputs.tag }}`](https://github.com/${{ github.repository }}/tree/${{ needs.build-site.outputs.tag }})
          commit-message: "Automated WVCC site generation for ${{ needs.build-site.outputs.year }}"
          add-paths: |
            docs/**
            
  publish-roundrobin:
    runs-on: ubuntu-latest
    needs: build-site
    env:
      YEAR: ${{ needs.build-site.outputs.year }}
    steps:
      - name: Checkout RoundRobinTT repo
        uses: actions/checkout@v4
        with:
          repository: RoundRobinTT/RoundRobinTT.github.io
          token: ${{ secrets.roundrobin_pat }}
          ref: main
          fetch-depth: 0
          path: rrrepo
          
      - name: Download RoundRobin SiteOutput
        uses: actions/download-artifact@v4
        with:
          name: rr-site
          path: rrrepo/docs/

      - name: Prepare branch name
        run: |
          branch="site-update-rr-${YEAR}-$(date +'%Y%m%d%H%M%S')"
          echo "branch=$branch" >> $GITHUB_ENV

      - name: Remove footer-only changes
        working-directory: rrrepo
        run: |
          set -euo pipefail
          git fetch origin main
      
          for f in $(git ls-files | grep '^docs/.*\.html$'); do
      
            # Detect if there is ANY diff at all
            if git diff -U0 origin/main -- "$f" | grep -qE '^[+-]'; then
      
              # Extract changed lines, excluding diff headers and the footer timestamp
              changes=$(git diff -U0 origin/main -- "$f" \
                          | grep -E '^[+-]' \
                          | grep -vE '^[+-]{3}' \
                          | grep -vE '^[-+].*<p class="generated">Generated .* UTC</p>.*$' \
                          || true)
      
              if [ -z "$changes" ]; then
                echo "FOOTER ONLY: $f"
                git checkout origin/main -- "$f"
              else
                echo "REAL CHANGES: $f"
              fi
            fi
          done
          
      - name: Stage generated site
        working-directory: rrrepo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b $branch
          git add docs/
          git status --porcelain

      - name: Check for meaningful changes
        id: rr_check_changes
        working-directory: rrrepo
        run: |
          if git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "No meaningful changes detected; skipping PR creation."
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "Meaningful changes detected; PR will be created."
          fi

      - name: Push branch
        if: steps.rr_check_changes.outputs.no_changes == 'false'
        working-directory: rrrepo
        run: |
          git push origin $branch

      - name: Create Pull Request
        if: steps.rr_check_changes.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ROUNDROBIN_PAT }}
          path: rrrepo
          base: main
          branch: ${{ env.branch }}
          title: "Automated Round Robin site generation for ${{ env.YEAR }}"
          body: |
            Round Robin static site for season ${{ env.YEAR }}.

            Generated from commit tag:  
            [`${{ needs.build-site.outputs.tag }}`](https://github.com/${{ github.repository }}/tree/${{ needs.build-site.outputs.tag }})
          commit-message: "Automated Round Robin site generation for ${{ env.YEAR }}"
          add-paths: |
            docs/**

